{% extends "web_ui/base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="max-w-5xl mx-auto h-[calc(100vh-140px)] flex flex-col bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200 dark:bg-[#0B1120] dark:border-gray-800">
    
    <div class="px-6 py-4 bg-white/80 backdrop-blur-md border-b border-gray-100 flex justify-between items-center z-10 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="flex items-center gap-4">
            <a href="{% url 'home' %}" class="h-10 w-10 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 transition dark:hover:bg-gray-800 dark:text-gray-400">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </a>
            <div>
                <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                    Group Chat
                    <span id="connection-badge" class="px-2 py-0.5 rounded-full bg-gray-200 text-gray-600 text-[10px] uppercase tracking-wide font-bold border border-gray-300 dark:bg-gray-700 dark:text-gray-400 dark:border-gray-600">
                        Connecting...
                    </span>
                </h2>
                <div class="flex items-center gap-2 mt-0.5">
                    <span id="status-indicator" class="relative flex h-2 w-2">
                      <span class="absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-0" id="ping-animation"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-gray-400" id="status-dot"></span>
                    </span>
                    <p id="status-text" class="text-xs text-gray-500 font-medium dark:text-gray-400">Connecting...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-container" class="flex-1 bg-gray-50/50 overflow-y-auto p-6 space-y-6 dark:bg-[#0f172a]">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center transition-opacity duration-500"> 
            <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-4 dark:bg-gray-800/50 shadow-inner">
                <i class="fa-regular fa-comments text-3xl text-indigo-300 dark:text-gray-600"></i>
            </div>
            <h3 class="text-gray-900 font-bold text-lg dark:text-white">Group Chat</h3>
            <p class="text-gray-500 text-sm mt-1 max-w-xs mx-auto dark:text-gray-400">Start typing or upload a file!</p>
        </div>
    </div>

    <div id="upload-progress-container" class="hidden px-6 py-2 bg-gray-50 border-t border-gray-100 dark:bg-gray-900 dark:border-gray-800">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cloud-arrow-up text-indigo-500 animate-bounce"></i>
            <span class="text-xs font-medium text-gray-500">Uploading...</span>
            <div class="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                <div id="upload-progress-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <div class="p-4 bg-white border-t border-gray-100 dark:bg-gray-900 dark:border-gray-800">
        <form id="chat-form" class="relative flex gap-3 items-end max-w-4xl mx-auto">
            
            <input type="file" id="file-input" class="hidden">
            
            <button type="button" id="file-trigger" class="bg-gray-100 text-gray-500 rounded-2xl w-14 h-[58px] flex items-center justify-center transition hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700">
                <i class="fa-solid fa-paperclip text-lg"></i>
            </button>

            <div class="flex-1 relative">
                <input type="text" id="message-input" 
                    class="w-full bg-gray-100 text-gray-900 rounded-2xl px-6 py-4 pr-12 focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all placeholder-gray-400 shadow-inner outline-none dark:bg-gray-800 dark:text-white dark:focus:bg-gray-700 dark:focus:ring-indigo-500/50"
                    placeholder="Type a message..." autocomplete="off" disabled>
            </div>
            
            <button type="submit" id="send-button"
                class="bg-gray-400 text-white rounded-2xl w-14 h-[58px] flex items-center justify-center transition shadow-lg cursor-not-allowed" disabled>
                <i class="fa-solid fa-paper-plane text-lg translate-x-0.5 translate-y-0.5"></i>
            </button>
        </form>
    </div>
</div>


<script>
    // ===== CLOUDINARY CONFIG =====
    const CLOUD_NAME = "{{ cloud_name }}";
    const UPLOAD_PRESET = "{{ upload_preset }}";

    const GO_BACKEND_URL = "{{ go_backend_url }}";
    // console.log("go url", GO_BACKEND_URL);

    // ===== Configuration =====
    const GROUP_ID = "{{ group_id }}";
    const CURRENT_USER_ID = "{{ user_id }}";
    const CURRENT_USER_NAME = "{{ username }}";
    
    // console.log("Chat Config:", { GROUP_ID, CURRENT_USER_ID, CURRENT_USER_NAME });
    //console.log( "{{chat_history}}");

    // ===== DOM Elements =====
    const chatContainer = document.getElementById('chat-container');
    const emptyState = document.getElementById('empty-state');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const fileInput = document.getElementById('file-input');
    const fileTrigger = document.getElementById('file-trigger');
    const uploadProgressContainer = document.getElementById('upload-progress-container');
    const uploadProgressBar = document.getElementById('upload-progress-bar');
    

    let oldestMessageId = null;
    let isLoadingHistory = false;
    let hasMoreHistory = true; // Set this to false if the backend returns 0 messages
    let isInitialLoadDone = false;

    function updateOldestId(messages) {
        if (messages && messages.length > 0) {
            // Find the minimum ID in the new batch of messages
            // console.log("messages are =>", messages);
            const ids = messages.map(m => (m.messageID));
            // console.log("Extracted IDs from batch:", ids);
            const minIdInBatch = Math.min(...ids);
            // console.log(`Oldest message ID in batch: ${minIdInBatch}`);
            // Update our global tracker if this batch has even older messages
            if (oldestMessageId === null || minIdInBatch < oldestMessageId) {
                oldestMessageId = minIdInBatch;
            }
        }
    }

    // ===== Load History =====
  //   const rawHistory = {{ chat_history|default:"[]"|safe }};
  //   const rw = JSON.parse('{{ chat_history|escapejs }}');
  //   // console.log("Raw history from backend:", rw);
//
  //   if (rawHistory && rawHistory.length > 0) {
  //       console.log("Loading chat history:", rawHistory);
  //       if (emptyState) emptyState.style.display = 'none';
  //       console.log("this is what i want to know");
  //       console.log("IDs:", rawHistory.map(m => m.message_id));
  //       rawHistory.forEach(msg => {
  //           const processedMsg = {
  //               id: msg.message_id,
  //               userID: String(msg.userID || msg.user_id),
  //               message: msg.message,
  //               username: msg.username || `User ${msg.userID}`,
  //               file_url: msg.file_url || msg.FileURL,
  //               file_type: msg.file_type || msg.FileType
  //           };
  //           // console.log("Processing historical message:", processedMsg);
  //           appendMessage(processedMsg, false);
  //       });
  //       //scrollToBottom();
  //       chatContainer.scrollTop = chatContainer.scrollHeight;
  //       // 2. Wait a tiny bit for the browser to finish painting, then unlock the listener
  //       setTimeout(() => {
  //           chatContainer.scrollTop = chatContainer.scrollHeight;
  //           isInitialLoadDone = true;
  //           updateOldestId(rawHistory);
  //       }, 100);
  //       console.log("Finished loading history. Setting oldestMessageId...");
  //       updateOldestId(rawHistory);
  //       console.log("Initial oldestMessageId set to:", oldestMessageId);
  //       // updateOldestId(rawHistory);
  //   }

    // ===== WebSocket Setup =====
    const ws_backend_url = "{{ ws_backend_url }}";
    if (window.location.protocol === 'https:' && ws_backend_url.startsWith('ws://')) {
        ws_backend_url = ws_backend_url.replace('ws://', 'wss://');
    }
    
   const WS_URL = `${ws_backend_url}/ws/chat/${GROUP_ID}`;
    let socket = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;

    function connect() {
        console.log(`[ws] Connecting to ${WS_URL}...`);
        updateStatus('connecting');
        
        socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            console.log(`[ws] ✓ Connected to group ${GROUP_ID}`);
            chatContainer.innerHTML = '';
            reconnectAttempts = 0;
            updateStatus('connected');
            enableInput();
        };

        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                const msgType = data.type || data.Type;
                // console.log("the data is ", data);
                // console.log("[ws] Received message:");

                // if (msgType === 'chat') {
                //     // console.log("[ws] 📨 Message received:", data);
                //     appendMessage(data, true);
                //     scrollToBottom();
                // }
                if (msgType === 'history') {
                    // console.log("Initial history received:", data.messages);

                    if (data.messages.length > 0) {
                        emptyState.style.display = 'none';

                        data.messages.forEach(msg => {
                            appendMessage(msg, false);
                            // console.log("msg ",msg);
                        });
                        // console.log("send to update oldest id");
                        updateOldestId(data.messages);
                        setTimeout(() => {
                            scrollToBottom();
                        }, 0);
                    }
                }else if (msgType === 'error') {
                    // console.error("[ws] ❌ Backend error:", data.message || data.Message);
                    alert("Error: " + (data.message || data.Message));
                } else if (msgType === 'status') {
                    // console.log("[ws] ℹ Status update:", data);
                }
            } catch (e) {
                console.error("[ws] Error parsing message:", e, event.data);
            }
        };

        socket.onerror = (error) => {
            console.error('[ws] ❌ Connection error:', error);
            updateStatus('error');
        };

        socket.onclose = (event) => {
            console.log('[ws] 🔌 Disconnected:', event.code, event.reason);
            updateStatus('disconnected');
            disableInput();
            
            if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                console.log(`[ws] 🔄 Reconnecting in ${delay}ms...`);
                setTimeout(connect, delay);
            } else {
                console.error('[ws] ❌ Max reconnection attempts reached');
                alert('Lost connection to chat. Please refresh the page.');
            }
        };
    }
    
    // Initial connection
    connect();

    // ===== File Upload Logic (CORRECTED) =====
    fileTrigger.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        uploadProgressContainer.classList.remove('hidden');
        uploadProgressBar.style.width = '0%';

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        // --- FIX IS HERE: Don't force 'raw' for PDFs ---
        // We removed "file.type === 'application/pdf'" from the condition below.
        let resourceType = 'auto';
        if (file.type.includes('spreadsheet') || 
            file.type.includes('document') || 
            file.type.includes('zip')) {
            resourceType = 'raw';
        }
        
        const uploadUrl = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`;

        try {
            const response = await fetch(uploadUrl, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Upload failed');
            
            const data = await response.json();
            const fileUrl = data.secure_url;
            
            if (socket && socket.readyState === WebSocket.OPEN) {
                const payload = {
                    type: "chat",
                    message: "Shared a file",
                    userID: CURRENT_USER_ID,
                    username: CURRENT_USER_NAME,
                    file_url: fileUrl,
                    file_type: file.type.startsWith('image/') ? 'image' : 'file'
                };
                socket.send(JSON.stringify(payload));
            }
        } catch (error) {
            console.error("Upload error:", error);
            alert("Failed to upload file.");
        } finally {
            uploadProgressContainer.classList.add('hidden');
            fileInput.value = ''; 
        }
    });

    // ===== Send Message =====
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;

        if (socket && socket.readyState === WebSocket.OPEN) {
            const payload = {
                type: "chat",
                message: text,
                userID: CURRENT_USER_ID,
                username: CURRENT_USER_NAME
            };
            socket.send(JSON.stringify(payload));
            messageInput.value = '';
            messageInput.focus();
        } else {
            alert("Connection is not open. Reconnecting...");
            connect();
        }
    });

    // ===== Scroll Listener for Pagination =====
    chatContainer.addEventListener("scroll", () => {
        // console.log("Scroll event detected. scrollTop:", chatContainer.scrollTop, "scrollHeight:", chatContainer.scrollHeight, "clientHeight:", chatContainer.clientHeight);
        // console.log("isLoadingHistory:", isLoadingHistory, "oldestMessageId:", oldestMessageId);
        if (chatContainer.scrollTop <= 10 && !isLoadingHistory && oldestMessageId !== null) {
            //console.log("Top reached! Loading more history...");
            loadMoreHistory();
        }
    });

    function appendMessage(data, animate = true) {
        if (emptyState) emptyState.style.display = 'none';

        const msgUserID = String(data.userID || data.UserID);
        const isMe = msgUserID === String(CURRENT_USER_ID);
        
        // --- FIX USERNAME DISPLAY ---
        // If it's me, use "You". If data has username, use it. Else fallback to "User ID"
        let displayName = "User";
        if (isMe) {
            displayName = "You";
        } else if (data.username && data.username.trim() !== "") {
            displayName = data.username;
        } else if (data.Username) { // Check capitalized case just in case
            displayName = data.Username;
        } else {
            displayName = `User ${msgUserID}`;
        }

        const initial = displayName.charAt(0).toUpperCase();

        const wrapper = document.createElement('div');
        wrapper.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'} mb-4 ${animate ? 'animate-fade-in-up' : ''}`;
        
        const bubbleClass = isMe 
            ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-sm shadow-md' 
            : 'bg-white text-gray-800 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 dark:bg-gray-800 dark:text-gray-100 dark:border-gray-700';

        // ... (File handling logic remains the same) ...
        const fileUrl = data.file_url || data.FileURL;
        const fileType = data.file_type || data.FileType;
        let contentHtml = '';
        
        if (fileUrl) {
             // ... (Keep your existing File/PDF logic here) ...
             if (fileType === 'image' || (fileUrl.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null)) {
                contentHtml = `<a href="${fileUrl}" target="_blank"><img src="${fileUrl}" class="max-w-xs rounded-lg mb-2 border border-black/10" alt="Shared Image"></a>`;
            } else {
                const downloadUrl = fileUrl.includes('upload/') ? fileUrl.replace('upload/', 'upload/fl_attachment/') : fileUrl;
                const viewerUrl = fileUrl; // Direct link for auto-preview
                contentHtml = `
                    <div class="flex flex-col gap-2 min-w-[200px]">
                        <div class="flex items-center gap-3 p-3 bg-black/5 rounded-lg dark:bg-white/10">
                            <div class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-indigo-500 shadow-sm">
                                <i class="fa-solid fa-file-pdf"></i>
                            </div>
                            <div class="text-sm">
                                <p class="font-bold opacity-90">Shared Document</p>
                                <p class="text-xs opacity-70">PDF / File</p>
                            </div>
                        </div>
                        <div class="flex gap-2 text-xs font-bold">
                            <a href="${viewerUrl}" target="_blank" class="flex-1 py-2 text-center bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition cursor-pointer">View</a>
                            <a href="${downloadUrl}" target="_blank" class="flex-1 py-2 text-center bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition cursor-pointer">Save</a>
                        </div>
                    </div>`;
            }
        } else {
            contentHtml = `<p class="text-sm leading-relaxed whitespace-pre-wrap font-medium">${escapeHtml(data.message || data.Message || "")}</p>`;
        }

        const time = data.created_at || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // Avatar only for others
        const avatarHTML = !isMe 
            ? `<div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600 mr-3 mt-1 flex-shrink-0 dark:bg-gray-700 dark:text-gray-300" title="${displayName}">${initial}</div>`
            : '';

        wrapper.innerHTML = `
            ${avatarHTML}
            <div class="max-w-[75%] md:max-w-[60%]">
                <div class="flex items-baseline justify-between gap-2 mb-1 pl-1">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${displayName}</span>
                    <span class="text-[10px] text-gray-400 opacity-60 ml-auto">${time}</span>
                </div>
                <div class="${bubbleClass} px-5 py-3.5 relative overflow-hidden">
                    ${contentHtml}
                </div>
            </div>
        `;
        chatContainer.appendChild(wrapper);
    }

        if (emptyState) emptyState.style.display = 'none';

        const msgUserID = String(data.userID || data.UserID);
        const isMe = msgUserID === String(CURRENT_USER_ID);
        //console.log("Prepending message:");

        // --- FIX USERNAME DISPLAY ---
        let displayName = "User";
        if (isMe) {
            displayName = "You";
        } else if (data.username && data.username.trim() !== "") {
            displayName = data.username;
        } else if (data.Username) { // Check capitalized case just in case
            displayName = data.Username;
        } else {
            displayName = `User ${msgUserID}`;
        }

        const initial = displayName.charAt(0).toUpperCase();

        const wrapper = document.createElement('div');

        // ... (File handling logic remains the same) ...
        const fileUrl = data.file_url || data.FileURL;
        const fileType = data.file_type || data.FileType;
        let contentHtml = '';

        if (fileUrl) {
             // ... (Keep your existing File/PDF logic here) ...
             if (fileType === 'image' || (fileUrl.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null)) {
                contentHtml = `<a href="${fileUrl}" target="_blank"><img src="${fileUrl}" class="max-w-xs rounded-lg mb-2 border border-black/10" alt="Shared Image"></a>`;
            } else {
                const downloadUrl = fileUrl.includes('upload/') ? fileUrl.replace('upload/', 'upload/fl_attachment/') : fileUrl;
                const viewerUrl = fileUrl; // Direct link for auto-preview
                contentHtml = `
                    <div class="flex flex-col gap-2 min-w-[200px]">
                        <div class="flex items-center gap-3 p-3 bg-black/5 rounded-lg dark:bg-white/10">
                            <div class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-indigo-500 shadow-sm">
                                <i class="fa-solid fa-file-pdf"></i>
                            </div>
                            <div class="text-sm">
                                <p class="font-bold opacity-90">Shared Document</p>
                                <p class="text-xs opacity-70">PDF / File</p>
                            </div>
                        </div>
                        <div class="flex gap-2 text-xs font-bold">
                            <a href="${viewerUrl}" target="_blank" class="flex-1 py-2 text-center bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition cursor-pointer">View</a>
                            <a href="${downloadUrl}" target="_blank" class="flex-1 py-2 text-center bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition cursor-pointer">Save</a>
                        </div>
                    </div>`;
            }
        } else {
            contentHtml = `<p class="text-sm leading-relaxed whitespace-pre-wrap font-medium">${escapeHtml(data.message || data.Message || "")}</p>`;
        }

        const time = data.created_at || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // Avatar only for others
        const avatarHTML = !isMe
            ? `<div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600 mr-3 mt-1 flex-shrink-0 dark:bg-gray-700 dark:text-gray-300" title="${displayName}">${initial}</div>`
            : '';

        wrapper.innerHTML = `
            ${avatarHTML}
            <div class="max-w-[75%] md:max-w-[60%]">
                <div class="flex items-baseline justify-between gap-2 mb-1 pl-1">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${displayName}</span>
                    <span class="text-[10px] text-gray-400 opacity-60 ml-auto">${time}</span>
                </div>
                <div class="${bubbleClass} px-5 py-3.5 relative overflow-hidden">
                    ${contentHtml}
                </div>
            </div>
        `;
        chatContainer.prepend(wrapper);
    }

    // ===== UI Helper Functions =====
    function updateStatus(status) {
        const connectionBadge = document.getElementById('connection-badge');
        const statusDot = document.getElementById('status-dot');
        const pingAnimation = document.getElementById('ping-animation');
        const statusText = document.getElementById('status-text');

        if (!connectionBadge) return; 

        const configs = {
            connecting: {
                badge: { text: 'Connecting...', classes: 'bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-400' },
                dot: 'bg-yellow-500',
                ping: false,
                text: 'Connecting...'
            },
            connected: {
                badge: { text: 'Live', classes: 'bg-indigo-50 text-indigo-600 border-indigo-100 dark:bg-indigo-900/30 dark:text-indigo-400' },
                dot: 'bg-emerald-500',
                ping: true,
                text: 'Online & Ready'
            },
            disconnected: {
                badge: { text: 'Offline', classes: 'bg-red-100 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400' },
                dot: 'bg-red-500',
                ping: false,
                text: 'Disconnected'
            },
            error: {
                badge: { text: 'Error', classes: 'bg-red-100 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400' },
                dot: 'bg-red-500',
                ping: false,
                text: 'Connection Error'
            }
        };

        const config = configs[status];
        if (!config) return;

        connectionBadge.textContent = config.badge.text;
        connectionBadge.className = `px-2 py-0.5 rounded-full text-[10px] uppercase tracking-wide font-bold border ${config.badge.classes}`;
        statusDot.className = `relative inline-flex rounded-full h-2 w-2 ${config.dot}`;
        pingAnimation.className = config.ping 
            ? `animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75`
            : `absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-0`;
        statusText.textContent = config.text;
    }

    function enableInput() {
        messageInput.disabled = false;
        messageInput.placeholder = "Type a message...";
        sendButton.disabled = false;
        sendButton.className = "bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl w-14 h-[58px] flex items-center justify-center transition shadow-lg shadow-indigo-500/30 hover:-translate-y-1 active:scale-95 active:shadow-sm dark:bg-indigo-600 dark:hover:bg-indigo-500 cursor-pointer";
    }

    function disableInput() {
        messageInput.disabled = true;
        messageInput.placeholder = "Reconnecting...";
        sendButton.disabled = true;
        sendButton.className = "bg-gray-400 text-white rounded-2xl w-14 h-[58px] flex items-center justify-center transition shadow-lg cursor-not-allowed";
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function loadMoreHistory() {
        if (isLoadingHistory || !hasMoreHistory) return;

        isLoadingHistory = true;
        // console.log(`Loading more history before message ID: ${oldestMessageId}...`);
        // 1. Record the total height BEFORE we add new messages
        const oldHeight = chatContainer.scrollHeight;

        try {
            const token ="{{ token }}";
            //console.log("TOKEN => ", token);
            const response = await fetch(`${GO_BACKEND_URL}/api/groups/${GROUP_ID}/chat-pagination?before_id=${oldestMessageId}`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const data = await response.json();
            // console.log("Pagination response:", data);

            if (data.messages && data.messages.length > 0) {
                // 2. Add the messages to the top (we'll look at the prepend function next)
                data.messages.reverse().forEach(msg => prependMessage(msg));

                // 3. Update our "bookmark" for the next scroll
                updateOldestId(data.messages);
                hasMoreHistory = data.has_more;

                // 4. Anchor the scroll using our math!
                const newHeight = chatContainer.scrollHeight;
                chatContainer.scrollTop = newHeight - oldHeight;
            }
        } finally {
            isLoadingHistory = false;
        }
    }

    // ===== Animations =====
    const style = document.createElement('style');
    style.innerHTML = `@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }`;
    document.head.appendChild(style);

    // ===== Cleanup =====
    window.addEventListener('beforeunload', () => {
        if (socket) socket.close();
    });
</script>
